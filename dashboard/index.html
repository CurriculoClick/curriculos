<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Pro | CurriculoClick</title>
    <link rel="stylesheet" href="assets/painel.css">
    <script src="https://kit.fontawesome.com/cb81440751.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="dashboard">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">
                <i class="fa-solid fa-bolt"></i> Admin Pro
            </div>
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" onclick="limparFormulario()"><i class="fa-solid fa-plus-circle"></i> Novo Currículo</a>
                <a href="../admin/" class="nav-item"><i class="fa-solid fa-list"></i> Netlify CMS</a>
                <a href="configuracao.html" class="nav-item"><i class="fa-solid fa-cog"></i> Configurações</a>
                <a href="../" class="nav-item"><i class="fa-solid fa-eye"></i> Ver Site</a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Search / Load Bar -->
            <div class="search-container">
                <div class="search-box">
                    <i class="fa-solid fa-search"></i>
                    <input type="text" id="loadId" placeholder="Digite o ID/Nome do currículo para editar (ex: milena-pacheco)">
                    <button onclick="carregarCurriculoExistente()" class="btn btn-primary">Carregar</button>
                </div>
            </div>

            <div class="panel-grid">
                
                <!-- Form Area -->
                <div class="form-container">
                    <form id="cvForm">
                        
                        <!-- Sección: Información General -->
                        <div class="form-card">
                            <div class="section-header">
                                <h2><i class="fa-solid fa-user-edit"></i> Dados Pessoais</h2>
                            </div>
                            <div class="form-group">
                                <label>Foto de Perfil</label>
                                <div class="photo-uploader" id="photoUploader">
                                    <i class="fa-solid fa-camera fa-2x"></i>
                                    <p>Trocar Imagem</p>
                                    <img id="photoPreview" class="photo-preview">
                                    <input type="file" id="photoInput" hidden accept="image/*">
                                </div>
                            </div>
                            <div class="row">
                                <div class="form-group"><label>Nome</label><input type="text" id="nome" class="form-control" placeholder="Milena Pacheco"></div>
                                <div class="form-group"><label>Profissão</label><input type="text" id="profissao" class="form-control" placeholder="Administradora"></div>
                            </div>
                            <div class="row-3">
                                <div class="form-group"><label>Idade</label><input type="text" id="idade" class="form-control"></div>
                                <div class="form-group"><label>Estado Civil</label><input type="text" id="estado_civil" class="form-control"></div>
                                <div class="form-group"><label>Localização</label><input type="text" id="localizacao" class="form-control"></div>
                            </div>
                            <div class="form-group">
                                <label>Perfil Profissional (Resumo)</label>
                                <textarea id="descricao" class="form-control" rows="3"></textarea>
                            </div>
                        </div>

                        <!-- Sección: Redes Sociais Dinâmicas -->
                        <div class="form-card">
                            <div class="section-header d-flex">
                                <h2><i class="fa-solid fa-share-nodes"></i> Redes Sociais</h2>
                                <button type="button" class="btn btn-small" onclick="adicionarSocial()"><i class="fa-solid fa-plus"></i></button>
                            </div>
                            <div id="socialList" class="dynamic-list">
                                <!-- JS Populated -->
                            </div>
                        </div>

                        <!-- Sección: Habilidades (Barras de Progresso) -->
                        <div class="form-card">
                            <div class="section-header d-flex">
                                <h2><i class="fa-solid fa-bolt"></i> Habilidades</h2>
                                <button type="button" class="btn btn-small" onclick="adicionarHabilidade()"><i class="fa-solid fa-plus"></i></button>
                            </div>
                            <div id="habilidadesList" class="dynamic-list">
                                <!-- JS Populated -->
                            </div>
                        </div>

                        <!-- Sección: Idiomas -->
                        <div class="form-card">
                            <div class="section-header d-flex">
                                <h2><i class="fa-solid fa-language"></i> Idiomas</h2>
                                <button type="button" class="btn btn-small" onclick="adicionarIdioma()"><i class="fa-solid fa-plus"></i></button>
                            </div>
                            <div id="idiomasList" class="dynamic-list">
                                <!-- JS Populated -->
                            </div>
                        </div>

                        <!-- Sección: Experiência Profissional -->
                        <div class="form-card">
                            <div class="section-header d-flex">
                                <h2><i class="fa-solid fa-briefcase"></i> Experiência Profissional</h2>
                                <button type="button" class="btn btn-small" onclick="adicionarExperiencia()"><i class="fa-solid fa-plus"></i></button>
                            </div>
                            <div id="experienciasList" class="dynamic-list">
                                <!-- JS Populated -->
                            </div>
                        </div>

                        <!-- Sección: WhatsApp Widget -->
                        <div class="form-card highlight">
                            <div class="section-header">
                                <h2><i class="fa-brands fa-whatsapp"></i> Configuração do WhatsApp Widget</h2>
                            </div>
                            <div class="row">
                                <div class="form-group">
                                    <label>Telefone do Widget (C/ DDD)</label>
                                    <input type="text" id="wa_numero" class="form-control" placeholder="219XXXXXXXX">
                                </div>
                                <div class="form-group" style="display:flex; align-items:center;">
                                    <label style="margin-right:10px">Widget Ativo?</label>
                                    <input type="checkbox" id="wa_ativo" checked>
                                </div>
                            </div>
                            <div class="form-group">
                                <label>Mensagem de Saudação Automática</label>
                                <textarea id="wa_msg_saudacao" class="form-control" rows="2" placeholder="Olá, estou interessado em seu trabalho!"></textarea>
                            </div>
                        </div>

                    </form>
                </div>

                <!-- Preview Column -->
                <div class="preview-container">
                    <div class="preview-card">
                        <div class="preview-browser">
                            <div class="browser-header">
                                <span class="dot dot-red"></span>
                                <span class="dot dot-yellow"></span>
                                <span class="dot dot-green"></span>
                            </div>
                            <iframe id="previewFrame" src="about:blank" class="preview-iframe-container"></iframe>
                        </div>
                    </div>
                </div>

            </div>
        </main>

        <!-- Actions Bar -->
        <div class="actions-bar">
            <button class="btn btn-outline" onclick="limparFormulario()">Limpar</button>
            <button class="btn btn-primary" id="publishBtn"><i class="fa-solid fa-cloud-upload"></i> Publicar / Atualizar Online</button>
        </div>

    </div>

    <!-- Modals / Loaders -->
    <div id="loader" class="loading-overlay">
        <div class="loader-content">
            <i class="fa-solid fa-sync fa-spin fa-3x"></i>
            <h3>Processando...</h3>
        </div>
    </div>

    <script src="assets/painel.js"></script>
</body>
</html>

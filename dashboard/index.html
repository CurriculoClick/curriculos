<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel CurriculoClick v3.0</title>
    <link rel="stylesheet" href="assets/painel.css">
    <script src="https://kit.fontawesome.com/cb81440751.js" crossorigin="anonymous"></script>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar Navigation (Drawer no Mobile) -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <i class="fa-solid fa-bolt-lightning"></i>
                <span>Admin v3.0</span>
                <button class="mobile-close" onclick="toggleSidebar()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            
            <nav class="sidebar-menu">
                <a href="#" class="menu-item active" onclick="limparFormulario()"><i class="fa-solid fa-plus-circle"></i> Novo</a>
                <a href="configuracao.html" class="menu-item"><i class="fa-solid fa-gears"></i> Ajustes</a>
                <a href="../" class="menu-item"><i class="fa-solid fa-eye"></i> Ver Site</a>
            </nav>

            <div class="sidebar-section">
                <h3><i class="fa-solid fa-users"></i> Recentes</h3>
                <div id="clientesList" class="client-list">
                    <!-- JS Populated -->
                </div>
            </div>
        </aside>

        <!-- Main Content Overlay -->
        <div class="sidebar-overlay" onclick="toggleSidebar()" id="overlay"></div>

        <!-- Main Viewport -->
        <main class="main-viewport">
            <!-- Header Mobile -->
            <header class="mobile-header">
                <button onclick="toggleSidebar()"><i class="fa-solid fa-bars"></i></button>
                <span>CurriculoClick</span>
                <button onclick="publicarCurriculo()"><i class="fa-solid fa-cloud-arrow-up"></i></button>
            </header>

            <div class="view-content">
                <div class="editor-grid">
                    
                    <!-- Editor Side -->
                    <div class="editor-workspace">
                        <form id="cvForm">
                            <!-- Card: Identidade -->
                            <div class="card">
                                <div class="card-header"><h3><i class="fa-solid fa-id-card"></i> Identidade</h3></div>
                                <div class="card-body">
                                    <div class="profile-upload-zone" id="photoUploader">
                                        <div class="img-wrapper">
                                            <img id="photoPreview" class="profile-img">
                                            <i class="fa-solid fa-camera upload-icon"></i>
                                        </div>
                                        <span>Trocar Foto</span>
                                        <input type="file" id="photoInput" hidden accept="image/*">
                                    </div>
                                    <div class="form-row">
                                        <div class="field-item">
                                            <label>Nome</label>
                                            <input type="text" id="nome" placeholder="Ex: Milena" class="input-pro">
                                        </div>
                                        <div class="field-item">
                                            <label>Sobrenome</label>
                                            <input type="text" id="sobrenome" placeholder="Ex: Pacheco" class="input-pro">
                                        </div>
                                    </div>
                                    <div class="field-item">
                                        <label>Profissão</label>
                                        <input type="text" id="profissao" placeholder="Ex: Administradora" class="input-pro">
                                    </div>
                                </div>
                            </div>

                            <!-- Card: Contato -->
                            <div class="card">
                                <div class="card-header"><h3><i class="fa-solid fa-map-location-dot"></i> Contato e Endereço</h3></div>
                                <div class="card-body">
                                    <div class="field-item">
                                        <label>Endereço Completo</label>
                                        <input type="text" id="endereco" placeholder="Ex: Rua Floriano Peixoto, 123... - Curitiba" class="input-pro">
                                    </div>
                                    <div class="form-row">
                                        <div class="field-item"><label>E-mail</label><input type="email" id="email" class="input-pro"></div>
                                        <div class="field-item"><label>Celular</label><input type="text" id="telefone" class="input-pro"></div>
                                    </div>
                                </div>
                            </div>

                            <!-- Card: Perfil -->
                            <div class="card">
                                <div class="card-header"><h3><i class="fa-solid fa-user-pen"></i> Perfil Profissional</h3></div>
                                <div class="card-body">
                                    <textarea id="descricao" class="textarea-pro" rows="4" placeholder="Escreva sobre você de forma livre..."></textarea>
                                </div>
                            </div>

                            <!-- Card: Redes Sociais -->
                            <div class="card">
                                <div class="card-header d-flex-sb">
                                    <h3><i class="fa-solid fa-share-nodes"></i> Redes Sociais</h3>
                                    <button type="button" class="btn-add" onclick="adicionarSocial()"><i class="fa-solid fa-plus"></i></button>
                                </div>
                                <div class="card-body" id="socialList">
                                    <!-- JS populated -->
                                </div>
                            </div>

                            <!-- Card: Habilidades (Max 5) -->
                            <div class="card">
                                <div class="card-header d-flex-sb">
                                    <h3><i class="fa-solid fa-bolt"></i> Habilidades (Máx 5)</h3>
                                    <button type="button" class="btn-add" onclick="adicionarHabilidade()"><i class="fa-solid fa-plus"></i></button>
                                </div>
                                <div class="card-body" id="habilidadesList">
                                    <!-- JS populated -->
                                </div>
                            </div>

                            <!-- Card: Idiomas (Max 3) -->
                            <div class="card">
                                <div class="card-header d-flex-sb">
                                    <h3><i class="fa-solid fa-language"></i> Idiomas (Máx 3)</h3>
                                    <button type="button" class="btn-add" onclick="adicionarIdioma()"><i class="fa-solid fa-plus"></i></button>
                                </div>
                                <div class="card-body" id="idiomasList">
                                    <!-- JS populated -->
                                </div>
                            </div>

                            <!-- Card: Experiência, Educação, Certificados -->
                            <div class="card">
                                <div class="card-header"><h3><i class="fa-solid fa-briefcase"></i> Trajetória</h3></div>
                                <div class="card-body">
                                    <div class="field-item"><label>Experiência Profissional</label><textarea id="exp_profissional" class="textarea-pro" rows="4" placeholder="Cargos, Empresas e Períodos..."></textarea></div>
                                    <div class="field-item"><label>Educação / Formação</label><textarea id="educacao" class="textarea-pro" rows="3" placeholder="Faculdade, Curso, Ano..."></textarea></div>
                                    <div class="field-item"><label>Certificados e Cursos</label><textarea id="certificados" class="textarea-pro" rows="3" placeholder="Certificações, workshops..."></textarea></div>
                                </div>
                            </div>

                            <!-- Card: Interesses & Ícones -->
                            <div class="card">
                                <div class="card-header"><h3><i class="fa-solid fa-face-smile"></i> Interesses e Ícones</h3></div>
                                <div class="card-body">
                                    <div class="icon-grid" id="interestIcons">
                                        <!-- JS populated -->
                                    </div>
                                </div>
                            </div>

                            <!-- Card: WhatsApp Widget (Redirecionamento) -->
                            <div class="card accent">
                                <div class="card-header"><h3><i class="fa-brands fa-whatsapp"></i> WhatsApp Widget</h3></div>
                                <div class="card-body">
                                    <div class="field-item">
                                        <label>Número do Cliente (Com DDD)</label>
                                        <input type="text" id="wa_numero" placeholder="219XXXXXXXX" class="input-pro">
                                        <small>O chat usará a foto de perfil automaticamente.</small>
                                    </div>
                                </div>
                            </div>

                        </form>
                    </div>

                    <!-- Preview Side (Desktop Only) -->
                    <div class="preview-workspace">
                        <div class="sticky-preview">
                            <div class="browser-mockup">
                                <div class="browser-ctrl"><span></span><span></span><span></span></div>
                                <iframe id="previewFrame" src="about:blank"></iframe>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </main>

        <!-- Floating Action Button (Mobile) -->
        <div class="fab-actions">
            <button class="fab btn-secondary" onclick="limparFormulario()"><i class="fa-solid fa-trash"></i></button>
            <button class="fab btn-primary" id="publishBtn"><i class="fa-solid fa-paper-plane"></i></button>
        </div>

    </div>

    <!-- Loading Screen -->
    <div id="loader" class="screen-loader">
        <div class="loader-box">
            <div class="spinner"></div>
            <h3>Publicando...</h3>
        </div>
    </div>

    <script src="assets/painel.js"></script>
    <script>
        // Toggle Sidebar no Mobile
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('show');
        }
    </script>
</body>
</html>

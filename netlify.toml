[build]
  command = ":"
  publish = "."

[build.environment]
  NODE_VERSION = "14"

# ──────────────────────────────────────────────
# Edge Functions
# ──────────────────────────────────────────────
# Injeta meta tags Open Graph dinamicamente para
# crawlers do WhatsApp, LinkedIn, Facebook, etc.
[[edge_functions]]
  function = "og-inject"
  path     = "/"

# ──────────────────────────────────────────────
# Redirects
# ──────────────────────────────────────────────

# 1. Servir config.yml diretamente (com prioridade)
[[redirects]]
  from = "/admin/config.yml"
  to = "/admin/config.yml"
  status = 200
  force = true

# 2. Servir outros arquivos estáticos dentro de /admin
[[redirects]]
  from = "/admin/*.*"
  to = "/admin/:splat"
  status = 200

# 3. Redirecionar /admin para o index.html do SPA
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

# 4. Redirecionar qualquer outra rota /admin/* para o SPA
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

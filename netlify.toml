[build]
  publish = "."

# Servir arquivos estáticos do CMS diretamente
[[redirects]]
  from = "/admin/config.yml"
  to = "/admin/config.yml"
  status = 200
  force = true

# Servir outros arquivos estáticos do CMS
[[redirects]]
  from = "/admin/*.*"
  to = "/admin/:splat"
  status = 200

# Redirecionar outras rotas /admin para o SPA
[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200 
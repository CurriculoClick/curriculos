backend:
  name: git-gateway # Usa Netlify Identity para autenticação
  branch: main # Branch principal do seu repositório
  repo: thiagodelgado/curriculoclick # Repositório GitHub

media_folder: "ativos/imagens/uploads" # Pasta onde as mídias serão salvas
public_folder: "/ativos/imagens/uploads" # Caminho público para as mídias

# Nenhuma coleção definida por enquanto, para simplificar o teste de login.
# Adicionaremos as coleções após o login funcionar.
collections:
  - name: "paginas_teste" # Nome da coleção (identificador)
    label: "Páginas de Teste" # Rótulo que aparece na UI do CMS
    folder: "_paginas_teste" # Pasta onde os arquivos desta coleção serão salvos
    create: true # Permitir criar novos itens
    slug: "{{slug}}" # Como gerar o nome do arquivo (a partir do título, por exemplo)
    fields: # Campos para cada item da coleção
      - {label: "Título", name: "title", widget: "string"}
      - {label: "Conteúdo", name: "body", widget: "markdown"} 
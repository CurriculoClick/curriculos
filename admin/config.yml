backend:
  name: git-gateway # Usa Netlify Identity para autenticação
  branch: main # Branch principal do seu repositório
  repo: thiagodelgado/curriculoclick # Repositório GitHub

locale: 'pt-BR' # Define o idioma da interface do CMS

media_folder: "dados/uploads" # Pasta onde as mídias serão salvas
public_folder: "/dados/uploads" # Caminho público para as mídias

# Adicionando as coleções de volta
collections:
  - name: "modelo" # Coleção para o arquivo único de modelo
    label: "Modelo Milena"
    files:
      - file: "dados/modelo.json"
        label: "Modelo Milena"
        name: "modelo"
        fields:
          - label: "Início"
            name: "inicio"
            widget: "object"
            fields:
              - { label: "Nome completo", name: "nome", widget: "string" }
              - { label: "Profissão",     name: "profissao",     widget: "string" }
              - { label: "Foto de perfil",name: "foto_perfil",   widget: "image" }
              - { label: "Idade",         name: "idade",         widget: "string" }
              - { label: "Estado civil",  name: "estado_civil",  widget: "string" }
              - { label: "Localização",   name: "localizacao",   widget: "string" }
              - { label: "Email",         name: "email",         widget: "string" }
              - { label: "Telefone",      name: "telefone",      widget: "string" }
              - { label: "Texto Botão Baixar", name: "botao_baixar", widget: "string" }
          - label: "Redes Sociais"
            name: "social"
            widget: "list"
            fields:
              - label: "Rede"
                name: "rede"
                widget: "select"
                options:
                  - { label: "<i class='fa fa-facebook'></i> Facebook", value: "facebook" }
                  - { label: "<i class='fa fa-instagram'></i> Instagram", value: "instagram" }
                  - { label: "<i class='fa fa-linkedin'></i> LinkedIn", value: "linkedin" }
                  - { label: "<i class='fa fa-youtube'></i> YouTube", value: "youtube" }
                  - { label: "<i class='fa fa-tiktok'></i> TikTok", value: "tiktok" }
                  - { label: "<i class='fa fa-pinterest'></i> Pinterest", value: "pinterest" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Perfil profissional"
            name: "perfil"
            widget: "object"
            fields:
              - { label: "Descrição", name: "descricao", widget: "text" }
          - label: "Habilidades"
            name: "habilidades"
            widget: "list"
            fields:
              - { label: "Nome",           name: "nome",                  widget: "string" }
              - { label: "Nível (0-100)",  name: "nivel",                 widget: "number", value_type: "int", min: 0, max: 100 }
          - label: "Idiomas"
            name: "idiomas"
            widget: "list"
            fields:
              - { label: "Nome",           name: "nome",                  widget: "string" }
              - { label: "Estrelas (1-5)", name: "estrelas",              widget: "number", value_type: "int", min: 1, max: 5 }
          - label: "Experiência Profissional"
            name: "experiencia_profissional"
            widget: "list"
            fields:
              - { label: "Cargo",          name: "cargo",                 widget: "string" }
              - { label: "Empresa",        name: "empresa",               widget: "string" }
              - { label: "Período",        name: "periodo",               widget: "string" }
              - { label: "Descrição",      name: "descricao",             widget: "text" }
          - label: "Certificações"
            name: "certificacoes"
            widget: "list"
            fields:
              - { label: "Título",         name: "titulo",                widget: "string" }
              - { label: "Ano",            name: "ano",                   widget: "string" }
              - { label: "Detalhes (Opcional)", name: "detalhes",              widget: "text", required: false }
          - label: "Educação"
            name: "educacao"
            widget: "list"
            fields:
              - { label: "Título",         name: "titulo",                widget: "string" }
              - { label: "Instituição",    name: "instituicao",           widget: "string" }
              - { label: "Período",        name: "periodo",               widget: "string" }
          - label: "Interesses"
            name: "interesses"
            widget: "list"
            max: 8 # Limita a seleção a no máximo 8 interesses
            field:
              label: "Interesse"
              name: "value"
              widget: "select"
              options:
                - { label: "<i class='fa fa-paw'></i> Pets", value: "Pets" }
                - { label: "<i class='fa fa-leaf'></i> Natureza", value: "Natureza" }
                - { label: "<i class='fa fa-plane'></i> Viagens", value: "Viagens" }
                - { label: "<i class='fa fa-gamepad'></i> Vídeo Game", value: "Vídeo Game" }
                - { label: "<i class='fa fa-film'></i> Filmes/Séries", value: "Filmes/Séries" }
                - { label: "<i class='fa fa-utensils'></i> Culinária", value: "Culinária" }
                - { label: "<i class='fa fa-trophy'></i> Esportes", value: "Esportes" }
                - { label: "<i class='fa fa-book'></i> Leitura", value: "Leitura" }
                - { label: "<i class='fa fa-music'></i> Música", value: "Música" }
                - { label: "<i class='fa fa-camera'></i> Fotografia", value: "Fotografia" }
                - { label: "<i class='fa fa-hands-helping'></i> Voluntariado", value: "Voluntariado" }
                - { label: "<i class='fa fa-laptop-code'></i> Tecnologia", value: "Tecnologia" }
                - { label: "<i class='fa fa-seedling'></i> Jardinagem", value: "Jardinagem" }
                - { label: "<i class='fa fa-palette'></i> Arte", value: "Arte" }
                - { label: "<i class='fa fa-pen-nib'></i> Escrita", value: "Escrita" }
                - { label: "<i class='fa fa-running'></i> Dança", value: "Dança" }
                - { label: "<i class='fa fa-spa'></i> Meditação", value: "Meditação" }
                - { label: "<i class='fa fa-tshirt'></i> Moda", value: "Moda" }
                - { label: "<i class='fa fa-scroll'></i> História", value: "História" }
                - { label: "<i class='fa fa-language'></i> Idiomas", value: "Idiomas" }
                - { label: "<i class='fa fa-meteor'></i> Astronomia", value: "Astronomia" }
                - { label: "<i class='fa fa-chess-knight'></i> Xadrez", value: "Xadrez" }
                - { label: "<i class='fa fa-podcast'></i> Podcasts", value: "Podcasts" }
                - { label: "<i class='fa fa-bicycle'></i> Ciclismo", value: "Ciclismo" }
                - { label: "<i class='fa fa-box-open'></i> Colecionismo", value: "Colecionismo" }
                - { label: "<i class='fa fa-star'></i> Customizável", value: "Customizavel" }
          - label: "WhatsApp"
            name: "whatsapp"
            widget: "object"
            fields:
              - { label: "Ativo?", name: "ativo", widget: "boolean", default: false }
              - { label: "Número (país/área)", name: "numero", widget: "string", required: false }
              - label: "Cumprimentos"
                name: "cumprimentos"
                widget: "object"
                fields:
                  - { label: "Manhã", name: "manha", widget: "string", required: false }
                  - { label: "Tarde", name: "tarde", widget: "string", required: false }
                  - { label: "Noite", name: "noite", widget: "string", required: false }
              - { label: "Mensagem pós cumprimento", name: "mensagemPosCumprimento", widget: "string", required: false }
              - { label: "Mensagem de redirecionamento", name: "mensagemRedirecionamento", widget: "string", required: false }

  - name: "curriculos" # Coleção para os múltiplos currículos
    label: "Currículos"
    folder: "dados" # Pasta onde os arquivos JSON estão
    preview_path: "/?id={{slug}}" # Caminho para visualizar o currículo no site final
    create: true # Permitir criar novos currículos
    slug: "{{slug}}" # Nome do arquivo será baseado no slug (geralmente do título/nome)
    extension: "json"
    pattern: '^((?!modelo).)*\.json$' # Padrão para encontrar arquivos .json exceto 'modelo.json'
    fields:
      - label: "Início"
        name: "inicio"
        widget: "object"
        fields:
          - { label: "Nome completo", name: "nome", widget: "string" }

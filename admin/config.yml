backend:
  name: git-gateway # Usa Netlify Identity para autenticação
  branch: main # Branch principal do seu repositório
  repo: CurriculoClick/curriculos # Repositório GitHub

# Configuração para desenvolvimento local
local_backend: true # Habilita backend local para desenvolvimento

locale: 'pt-BR' # Define o idioma da interface do CMS

media_folder: "dados/uploads" # Pasta onde as mídias serão salvas
public_folder: "/dados/uploads" # Caminho público para as mídias

# Adicionando as coleções de volta
collections:
  - name: "modelo" # Coleção para o arquivo único de modelo
    label: "Modelo Milena"
    files:
      - file: "dados/modelo.json"
        label: "Modelo Milena"
        name: "modelo"
        fields:
          - label: "Informações Iniciais"
            name: "inicio"
            widget: "object"
            fields:
              - { label: "Nome completo", name: "nome", widget: "string" }
              - { label: "Profissão", name: "profissao", widget: "string" }
              - { 
                  label: "Foto de perfil", 
                  name: "foto_perfil", 
                  widget: "image", 
                  media_folder: "dados/uploads/modelo",
                  public_folder: "dados/uploads/modelo",
                  media_library: {
                    config: {
                      multiple: false
                    }
                  }
                }
              - { label: "Idade", name: "idade", widget: "string" }
              - { label: "Estado civil", name: "estado_civil", widget: "string" }
              - { label: "CNH", name: "cnh", widget: "select", options: ["A", "B", "AB", "C", "D", "E", "ACC"], required: false }
              - { label: "Localização", name: "localizacao", widget: "string" }
              - { label: "Email", name: "email", widget: "string" }
              - { label: "Telefone", name: "telefone", widget: "string" }
              - { label: "Texto Botão Baixar", name: "botao_baixar", widget: "string" }

          - label: "Redes Sociais (Máx 4)"
            name: "social"
            widget: "list"
            max: 4
            required: false
            fields:
              - { label: "Rede", name: "rede", widget: "select", options: ["Facebook", "Instagram", "LinkedIn", "WhatsApp", "GitHub", "YouTube", "TikTok", "Telegram", "Discord", "Twitter/X", "Custom"] }
              - { label: "URL ou Usuário", name: "url", widget: "string" }
              - { label: "Rótulo (Opcional)", name: "label", widget: "string", required: false }

          - label: "Perfil"
            name: "perfil"
            widget: "object"
            required: false
            fields:
              - { label: "Descrição", name: "descricao", widget: "text", required: false }

          - label: "Habilidades"
            name: "habilidades"
            widget: "list"
            required: false
            fields:
              - { label: "Nome", name: "nome", widget: "string" }
              - { label: "Nível (0-100)", name: "nivel", widget: "number", value_type: "int", min: 0, max: 100 }

          - label: "Idiomas"
            name: "idiomas"
            widget: "list"
            required: false
            fields:
              - { label: "Nome", name: "nome", widget: "string" }
              - { label: "Estrelas (1-5)", name: "estrelas", widget: "number", value_type: "int", min: 1, max: 5 }

          - label: "Experiência Profissional"
            name: "experiencia_profissional"
            widget: "list"
            required: false
            fields:
              - { label: "Cargo", name: "cargo", widget: "string" }
              - { label: "Empresa", name: "empresa", widget: "string" }
              - { label: "Período", name: "periodo", widget: "string" }
              - { label: "Descrição", name: "descricao", widget: "text", required: false }

          - label: "Certificações"
            name: "certificacoes"
            widget: "list"
            required: false
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Ano", name: "ano", widget: "string" }
              - { label: "Detalhes", name: "detalhes", widget: "text", required: false }

          - label: "Educação"
            name: "educacao"
            widget: "list"
            required: false
            fields:
              - { label: "Título", name: "titulo", widget: "string" }
              - { label: "Instituição", name: "instituicao", widget: "string" }
              - { label: "Período", name: "periodo", widget: "string" }

          - label: "Interesses"
            name: "interesses"
            widget: "list"
            required: false
            max: 8
            field:
              label: "Interesse"
              name: "value"
              widget: "select"
              options:
                - { label: "🐶 Pets", value: "Pets" }
                - { label: "🌳 Natureza", value: "Natureza" }
                - { label: "✈️ Viagens", value: "Viagens" }
                - { label: "🎮 Vídeo Game", value: "Vídeo Game" }
                - { label: "🎬 Filmes/Séries", value: "Filmes/Séries" }
                - { label: "🍳 Culinária", value: "Culinária" }
                - { label: "🏅 Esportes", value: "Esportes" }
                - { label: "📚 Leitura", value: "Leitura" }
                - { label: "🎵 Música", value: "Música" }
                - { label: "📷 Fotografia", value: "Fotografia" }
                - { label: "🤝 Voluntariado", value: "Voluntariado" }
                - { label: "💻 Tecnologia", value: "Tecnologia" }
                - { label: "🌱 Jardinagem", value: "Jardinagem" }
                - { label: "🎨 Arte", value: "Arte" }
                - { label: "✍️ Escrita", value: "Escrita" }
                - { label: "🎭 Festa/Dança", value: "Festa/Dança" }
                - { label: "🧘‍♂️ Meditação", value: "Meditação" }
                - { label: "👗 Moda", value: "Moda" }
                - { label: "📜 História", value: "História" }
                - { label: "🗣️ Idiomas", value: "Idiomas" }
                - { label: "🔭 Astronomia", value: "Astronomia" }
                - { label: "♟️ Xadrez", value: "Xadrez" }
                - { label: "🎙️ Podcasts", value: "Podcasts" }
                - { label: "🚴 Ciclismo", value: "Ciclismo" }
                - { label: "📦 Colecionismo", value: "Colecionismo" }
                - { label: "⭐ Customizável", value: "Customizavel" }
                - { label: "👶 Maternidade", value: "Maternidade" }
                - { label: "👶 Filhos", value: "Filhos" }
                - { label: "👥 Família", value: "Família" }
                - { label: "💻 Programação", value: "Programação" }
                - { label: "🌐 Internet", value: "Internet" }
                - { label: "# Redes Sociais", value: "Redes Sociais" }
                - { label: "✍️ Blogar", value: "Blogar" }
                - { label: "🏖️ Praia", value: "Praia" }
                - { label: "🛍️ Shopping", value: "Shopping" }
                - { label: "🍹 Shows/Eventos", value: "Shows/Eventos" }
                - { label: "🧠 Aprendizagem", value: "Aprendizagem" }
                - { label: "🌳 Open Source", value: "Open Source" }
                - { label: "🤵 Mentoria", value: "Mentoria" }
                - { label: "🤝 Networking", value: "Networking" }
                - { label: "📁 Projetos", value: "Projetos" }
                - { label: "❤️ Saúde e Beleza", value: "Saúde e Beleza" }

          - label: "WhatsApp"
            name: "whatsapp"
            widget: "object"
            fields:
              - { label: "WhatsApp ativo?", name: "ativo", widget: "boolean", default: false }
              - { label: "Número (com país/área)", name: "numero", widget: "string", required: false, pattern: ['^[0-9]+$', 'Apenas números são permitidos'] }
              - label: "Cumprimentos"
                name: "cumprimentos"
                widget: "object"
                fields:
                  - { label: "Manhã", name: "manha", widget: "string", required: false }
                  - { label: "Tarde", name: "tarde", widget: "string", required: false }
                  - { label: "Noite", name: "noite", widget: "string", required: false }
              - { label: "Mensagem pós cumprimento", name: "mensagemPosCumprimento", widget: "string", required: false }
              - { label: "Mensagem pré-definida", name: "mensagemPadrao", widget: "string", required: false }

  - name: "curriculos" # Coleção para os múltiplos currículos
    label: "Currículos"
    folder: "dados" # Pasta onde os arquivos JSON estão
    preview_path: "/?id={{slug}}" # Caminho para visualizar o currículo no site final
    create: true # Permitir criar novos currículos
    identifier_field: "inicio.nome" # Campo que será usado como rótulo na lista
    slug: "{{slug}}" # Nome do arquivo será baseado no slug (geralmente do título/nome)
    extension: "json"
    pattern: '^((?!modelo).)*\.json$' # Padrão para encontrar arquivos .json exceto 'modelo.json'
    fields: # Os campos são os mesmos do modelo
      - label: "Informações Iniciais"
        name: "inicio"
        widget: "object"
        fields:
          - { label: "Nome completo", name: "nome", widget: "string" }
          - { label: "Profissão", name: "profissao", widget: "string" }
          - { 
              label: "Foto de perfil", 
              name: "foto_perfil", 
              widget: "image", 
              media_folder: "dados/uploads/{{slug}}", 
              public_folder: "/dados/uploads/{{slug}}",
              media_library: {
                config: {
                  multiple: false
                }
              }
            }
          - { label: "Idade", name: "idade", widget: "string" }
          - { label: "Estado civil", name: "estado_civil", widget: "string" }
          - { label: "CNH", name: "cnh", widget: "select", options: ["A", "B", "AB", "C", "D", "E", "ACC"], required: false }
          - { label: "Localização", name: "localizacao", widget: "string" }
          - { label: "Email", name: "email", widget: "string" }

backend:
  name: git-gateway
  branch: master
  repo: githubUsername/githubRepo

media_folder: "ativos/imagens/uploads"
public_folder: "/ativos/imagens/uploads"

i18n:
  default_locale: pt-BR
  locales:
    - en
    - pt-BR
  structure: multiple_files

collections:
  - name: "modelo"
    label: "Modelo Milena"
    files:
      - file: "dados/modelo.json"
        label: "Modelo Milena"
        name: "modelo"
        fields:
          - { label: "Nome completo",    name: "inicio.nome",           widget: "string" }
          - { label: "Profissão",         name: "inicio.profissao",      widget: "string" }
          - { label: "Foto de perfil",    name: "inicio.foto_perfil",    widget: "image" }
          - { label: "Idade",             name: "inicio.idade",          widget: "string" }
          - { label: "Estado civil",      name: "inicio.estado_civil",   widget: "string" }
          - { label: "Localização",       name: "inicio.localizacao",    widget: "string" }
          - { label: "Email",             name: "inicio.email",          widget: "string" }
          - { label: "Telefone",          name: "inicio.telefone",       widget: "string" }
          - { label: "Botão de baixar",   name: "inicio.botao_baixar",   widget: "string" }
          - { label: "Facebook",          name: "social.facebook",       widget: "string" }
          - { label: "Instagram",         name: "social.instagram",      widget: "string" }
          - { label: "LinkedIn",          name: "social.linkedin",       widget: "string" }
          - { label: "Perfil profissional",name: "perfil.descricao",     widget: "text" }
          - label: "Habilidades"
            name: "habilidades"
            widget: "list"
            fields:
              - { label: "Nome",           name: "nome",                  widget: "string" }
              - { label: "Nível",          name: "nivel",                 widget: "number" }
          - label: "Idiomas"
            name: "idiomas"
            widget: "list"
            fields:
              - { label: "Nome",           name: "nome",                  widget: "string" }
              - { label: "Estrelas",       name: "estrelas",              widget: "number" }
          - label: "Experiência profissional"
            name: "experiencia_profissional"
            widget: "list"
            fields:
              - { label: "Cargo",          name: "cargo",                 widget: "string" }
              - { label: "Empresa",        name: "empresa",               widget: "string" }
              - { label: "Período",        name: "periodo",               widget: "string" }
              - { label: "Descrição",      name: "descricao",             widget: "text" }
          - label: "Certificações"
            name: "certificacoes"
            widget: "list"
            fields:
              - { label: "Título",         name: "titulo",                widget: "string" }
              - { label: "Ano",            name: "ano",                   widget: "string" }
              - { label: "Detalhes",       name: "detalhes",              widget: "text", required: false }
          - label: "Educação"
            name: "educacao"
            widget: "list"
            fields:
              - { label: "Título",         name: "titulo",                widget: "string" }
              - { label: "Instituição",    name: "instituicao",           widget: "string" }
              - { label: "Período",        name: "periodo",               widget: "string" }
          - label: "Interesses"
            name: "interesses"
            widget: "list"
          - { label: "WhatsApp ativo?",    name: "whatsapp.ativo",        widget: "boolean" }
          - { label: "WhatsApp número",    name: "whatsapp.numero",       widget: "string" }
          - { label: "Cumprimento manhã",  name: "whatsapp.cumprimentos.manha", widget: "string" }
          - { label: "Cumprimento tarde",  name: "whatsapp.cumprimentos.tarde", widget: "string" }
          - { label: "Cumprimento noite",  name: "whatsapp.cumprimentos.noite", widget: "string" }
          - { label: "Mensagem pós cumprimento", name: "whatsapp.mensagemPosCumprimento", widget: "string" }
  - name: "curriculos"
    label: "Currículos"
    folder: "dados"
    pattern: '^(?!modelo\.json$).*\.json$'
    create: true
    extension: "json"
    preview_path: "?id={{slug}}"
    slug: "{{slug}}"
    fields:
      - { label: "Nome completo",    name: "inicio.nome",           widget: "string" }
      - { label: "Profissão",         name: "inicio.profissao",      widget: "string" }
      - { label: "Foto de perfil",    name: "inicio.foto_perfil",    widget: "image" }
      - { label: "Idade",             name: "inicio.idade",          widget: "string" }
      - { label: "Estado civil",      name: "inicio.estado_civil",   widget: "string" }
      - { label: "Localização",       name: "inicio.localizacao",    widget: "string" }
      - { label: "Email",             name: "inicio.email",          widget: "string" }
      - { label: "Telefone",          name: "inicio.telefone",       widget: "string" }
      - { label: "Botão de baixar",   name: "inicio.botao_baixar",   widget: "string" }
      - { label: "Facebook",          name: "social.facebook",       widget: "string" }
      - { label: "Instagram",         name: "social.instagram",      widget: "string" }
      - { label: "LinkedIn",          name: "social.linkedin",       widget: "string" }
      - { label: "Perfil profissional",name: "perfil.descricao",     widget: "text" }
      - label: "Habilidades"
        name: "habilidades"
        widget: "list"
        fields:
          - { label: "Nome",           name: "nome",                  widget: "string" }
          - { label: "Nível",          name: "nivel",                 widget: "number" }
      - label: "Idiomas"
        name: "idiomas"
        widget: "list"
        fields:
          - { label: "Nome",           name: "nome",                  widget: "string" }
          - { label: "Estrelas",       name: "estrelas",              widget: "number" }
      - label: "Experiência profissional"
        name: "experiencia_profissional"
        widget: "list"
        fields:
          - { label: "Cargo",          name: "cargo",                 widget: "string" }
          - { label: "Empresa",        name: "empresa",               widget: "string" }
          - { label: "Período",        name: "periodo",               widget: "string" }
          - { label: "Descrição",      name: "descricao",             widget: "text" }
      - label: "Certificações"
        name: "certificacoes"
        widget: "list"
        fields:
          - { label: "Título",         name: "titulo",                widget: "string" }
          - { label: "Ano",            name: "ano",                   widget: "string" }
          - { label: "Detalhes",       name: "detalhes",              widget: "text", required: false }
      - label: "Educação"
        name: "educacao"
        widget: "list"
        fields:
          - { label: "Título",         name: "titulo",                widget: "string" }
          - { label: "Instituição",    name: "instituicao",           widget: "string" }
          - { label: "Período",        name: "periodo",               widget: "string" }
      - label: "Interesses"
        name: "interesses"
        widget: "list"
      - { label: "WhatsApp ativo?",    name: "whatsapp.ativo",        widget: "boolean" }
      - { label: "WhatsApp número",    name: "whatsapp.numero",       widget: "string" }
      - { label: "Cumprimento manhã",  name: "whatsapp.cumprimentos.manha", widget: "string" }
      - { label: "Cumprimento tarde",  name: "whatsapp.cumprimentos.tarde", widget: "string" }
      - { label: "Cumprimento noite",  name: "whatsapp.cumprimentos.noite", widget: "string" }
      - { label: "Mensagem pós cumprimento", name: "whatsapp.mensagemPosCumprimento", widget: "string" }
      # adicione aqui outras seções: habilidades, idiomas, experiência, certificados, educação, interesses etc. 
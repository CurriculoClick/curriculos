<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <title>CMS Currículo Click</title>
  </head>
  <body>
    <!-- Carrega o Netlify Identity Widget -->
    <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
    <script>
      if (window.netlifyIdentity) {
        // Inicializa o widget para processar tokens de convite e mostrar formulários
        window.netlifyIdentity.init();
        window.netlifyIdentity.on('login', () => {
          document.location.href = '/admin/';
        });
      }
    </script>
    <!-- Desabilita init automático do Netlify CMS -->
    <script>window.CMS_MANUAL_INIT = true;</script>
    <!-- Carrega o bundle do Netlify CMS já com locale pt-BR -->
    <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js?locale=pt-BR"></script>
    <!-- Inicializa o CMS usando config.yml padrão -->
    <script>window.CMS.init();</script>
  </body>
</html>

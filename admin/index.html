<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CMS Currículo Click</title>
  <!-- Force clear CMS cache -->
  <script>
    // Limpar cache do CMS para garantir que as alterações no config.yml sejam carregadas
    window.localStorage.removeItem('netlify-cms-collections');
    window.localStorage.removeItem('netlify-cms-config');
    window.localStorage.clear();
  </script>

</head>
<body>
  <!-- Inclui o script do Netlify CMS -->
  <script src="https://unpkg.com/netlify-cms@^2.0.0/dist/netlify-cms.js"></script>

</body>
</html>
